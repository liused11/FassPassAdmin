<p-sidebar
  [(visible)]="visible"
  position="right"
  styleClass="parking-history-sidebar"
  [modal]="true"
  [baseZIndex]="10000"
  [showCloseIcon]="false"
  [dismissible]="false"
  [blockScroll]="true"
>

  <div class="sidebar-content">

    <!-- 1. ชื่อลาน -->
    <div class="sidebar-top">
      <div class="parking-title">
        {{ parkingName }}
      </div>

      <button class="close-btn" (click)="close()">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="divider"></div>

    <!-- 2. หัวข้อ + search -->
    <div class="history-header">
      <div>ประวัติ</div>
      <i class="pi pi-search"></i>
    </div>

    <!-- 3. รายการ + ดูเพิ่มเติม -->
    <div class="list-header">
      <div class="list-title">รายการ</div>
      <button class="view-more" (click)="loadMore.emit()">
        ดูรายการเพิ่มเติม
      </button>
    </div>

    <!-- loading -->
    <p-skeleton 
      *ngIf="loading" 
      height="80px" 
      borderRadius="16px">
    </p-skeleton>

    <!-- History List -->
    <div class="history-list">

      <div *ngFor="let item of sortedHistory" class="history-card">

        <div class="icon" [ngClass]="getColor(item)">
          <i [class]="getIcon(item)"></i>
        </div>

        <div class="content">
          <div class="card-title">
            {{ getTitle(item) }}
          </div>

          <div class="card-meta">
            แก้ไขโดย {{ item.updatedBy }}
          </div>

          <div class="card-time">
            {{ formatDate(item.updatedAt) }}
          </div>
        </div>

      </div>

    </div>

  </div>
</p-sidebar>
