<!-- parking-edit-sidebar.component.html  -->
<p-sidebar
  [(visible)]="visible"
  position="right"
  appendTo="body"
  styleClass="parking-edit-fullscreen"
  [modal]="true"
  [baseZIndex]="10000"
  [showCloseIcon]="false"
  [dismissible]="false"
  [blockScroll]="true"
  >
  

  <!-- LOADING -->
  <ng-container *ngIf="loading">
    <div class="loading-wrapper">
      <p-skeleton width="60%" height="24px" class="mb-4"></p-skeleton>
      <p-skeleton width="100%" height="48px" class="mb-3"></p-skeleton>
      <p-skeleton width="100%" height="48px" class="mb-3"></p-skeleton>
      <p-skeleton width="100%" height="48px" class="mb-3"></p-skeleton>
    </div>
  </ng-container>

  <!-- ERROR -->
  <ng-container *ngIf="!loading && error">
    <div class="error-wrapper">

      <i class="pi pi-exclamation-triangle text-red-500"></i>

      <div class="title">โหลดข้อมูลไม่สำเร็จ</div>

      <div class="desc" *ngIf="error === 'network'">
        ไม่มีอินเทอร์เน็ต
      </div>

      <div class="desc" *ngIf="error === 'server'">
        เซิร์ฟเวอร์มีปัญหา
      </div>

      <div class="desc" *ngIf="error === 'timeout'">
        เซิร์ฟเวอร์ตอบช้าเกินไป
      </div>

      <button pButton label="ปิด" (click)="close()"></button>
    </div>
  </ng-container>

  <!-- FORM -->
  <form *ngIf="!loading && !error && data"
        [formGroup]="form"
        class="sidebar-content split-layout">
    
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <!-- HEADER -->
      <div class="sidebar-header">

        <div class="header-left">
          <div class="title">
            แก้ไขสถานที่จอดรถ
          </div>
        </div>

        <div class="header-right">
          <div class="status-group">
            <span>สถานะการใช้งาน</span>
            <p-inputSwitch formControlName="isActive"></p-inputSwitch>
          </div>
        </div>

      </div>

      <!-- ข้อมูลทั่วไป -->
      <div class="section">
        <div class="section-title blue">
          <i class="pi pi-info-circle"></i>
          ข้อมูลทั่วไป
        </div>

        <div class="map-box image-upload" (click)="fileInput.click()">
          <i class="pi pi-image"></i>
          <div>เพิ่มรูปสถานที่ของคุณ</div>

          <input
            #fileInput
            type="file"
            accept="image/*"
            hidden
            (change)="onFileSelected($event)"
          />
        </div>

        <!-- preview -->
        <div class="image-preview" *ngIf="form.value.images?.length">
          <div
            class="preview-item"
            *ngFor="let img of form.value.images; let i = index"
          >
            <img [src]="img" />
            <i class="pi pi-times remove" (click)="removeImage(i)"></i>
          </div>
        </div>

        <div class="field">
          <label>ชื่อสถานที่</label>
          <input pInputText formControlName="name" />
        </div>

        <div class="field">
          <label>ที่อยู่แบบเต็ม</label>
          <textarea pInputTextarea
                    rows="3"
                    formControlName="address"></textarea>
        </div>
      </div>

      <!-- เวลา -->
      <div class="section">
        <div class="section-title blue">
          <i class="pi pi-clock"></i>
          เวลาทำการและสถานะ
        </div>

        <div class="two-col">
          <div class="field">
            <label>เวลาเปิดทำการ</label>
            <p-dropdown
              [options]="timeOptions"
              formControlName="openTime"
              appendTo="body">
            </p-dropdown>
          </div>

          <div class="field">
            <label>เวลาปิดทำการ</label>
            <p-dropdown
              [options]="timeOptions"
              formControlName="closeTime">
            </p-dropdown>
          </div>
        </div>
      </div>

      <!-- ความจุ -->
      <div class="section" formGroupName="role_prices">
        <div class="section-title blue">
          <i class="pi pi-wallet"></i>
          การตั้งค่าราคา (บาท/ชม.)
        </div>

        <div class="price-grid">
          <div class="field">
            <label>ผู้ให้บริการ (Host)</label>
            <p-inputNumber 
              formControlName="Host"
              mode="currency"
              currency="THB"
              locale="th-TH">
            </p-inputNumber>
          </div>

          <div class="field">
            <label>ผู้ใช้งานทั่วไป (User)</label>
            <p-inputNumber 
              formControlName="User"
              mode="currency"
              currency="THB"
              locale="th-TH">
            </p-inputNumber>
          </div>

          <div class="field">
            <label>ผู้เยี่ยมชม (Visitor)</label>
            <p-inputNumber 
              formControlName="Visitor"
              mode="currency"
              currency="THB"
              locale="th-TH">
            </p-inputNumber>
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="sidebar-footer">
        <button pButton
                type="button"
                label="ยกเลิก"
                class="cancel-btn"
                (click)="close()">
        </button>

        <button pButton
                type="button"
                label="บันทึกการเปลี่ยนแปลง"
                class="save-btn"
                (click)="onSave()">
        </button>
      </div>
    </div>
    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <app-slot-manager
        [buildingId]="data.id"
        [visible]="visible"
        [token]="token">
      </app-slot-manager>
    </div>


  </form>
</p-sidebar>
